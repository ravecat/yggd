name: release apps
run-name: ${{ github.event.head_commit.message || format('release apps {0}', github.ref_name) }}

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  metadata:
    name: Collect app metadata
    runs-on: ubuntu-latest
    if: github.ref_name == github.event.repository.default_branch
    outputs:
      affected_apps: ${{ steps.affected.outputs.apps }}
    defaults:
      run:
        shell: nix develop --command bash --noprofile --norc -eo pipefail {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.repository.default_branch || github.ref }}
          fetch-depth: 0
          filter: tree:0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set SHAs for affected detection
        uses: nrwl/nx-set-shas@v4

      - name: Detect affected apps
        id: affected
        run: |
          APPS=$(pnpm exec nx show projects --type app --affected --json | jq -c '.')
          echo "apps=$APPS" >> "$GITHUB_OUTPUT"
          echo "Found affected apps: $APPS"

  release-apps:
    name: Release apps
    runs-on: ubuntu-latest
    needs: [metadata]
    if: |-
      github.event_name == 'workflow_dispatch' &&
      needs.metadata.outputs.affected_apps != '[]'
    concurrency:
      group: release-apps-${{ github.event.repository.default_branch }}
      cancel-in-progress: true
    permissions:
      contents: write
      actions: read
      pull-requests: read
    defaults:
      run:
        shell: nix develop --command bash --noprofile --norc -eo pipefail {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          filter: tree:0
          persist-credentials: true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Set Git user
        run: |
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git config user.name "${{ github.actor }}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release apps
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm exec nx release --projects=${{ join(fromJson(needs.metadata.outputs.affected_apps), ',') }} --skip-publish
          git push --atomic --no-verify --follow-tags origin "HEAD:${{ github.event.repository.default_branch }}"

  publish-affected-apps:
    name: Build and push ${{ matrix.app }} to GHCR
    runs-on: ubuntu-latest
    needs: [metadata]
    if: |-
      github.event_name == 'push' &&
      github.ref_name == github.event.repository.default_branch &&
      needs.metadata.outputs.affected_apps != '[]'
    env:
      REGISTRY: ghcr.io
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: ${{ fromJson(needs.metadata.outputs.affected_apps) }}
      max-parallel: 2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{
            github.event.repository.name }}/${{ matrix.app }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.app }} docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_DIR=apps/${{ matrix.app }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          platforms: linux/amd64
